<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <title>Din Feiring</title>
    <script>
      (function () {
        var l = window.location
        var pathSegments = l.pathname.split('/').filter(Boolean)
        var pathSegmentsToKeep = /\.github\.io$/i.test(l.hostname) && pathSegments.length > 0 ? 1 : 0
        var redirectPath =
          l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash

        window.location.replace(redirectPath)
      })()
    </script>
  </head>
  <body></body>
</html>
